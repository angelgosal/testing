<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusCare Admin</title>

  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="adminstyle.css">
</head>
<body>
  <div class="phone">

    <header class="logo-container">
      <img src="logo.png" alt="CampusCare Logo" class="main-logo">
    </header>

    <div class="top-actions">
      <div class="sort-wrapper">
        <button class="sort-btn" id="sortBtn">
          Sort <i class="fa fa-chevron-up"></i>
        </button>

        <div class="sort-dropdown" id="sortMenu">
          <div class="sort-item" data-sort="latest">Latest</div>
          <div class="sort-item" data-sort="oldest">Oldest</div>
          <div class="sort-item" data-sort="19th">19th Floor</div>
          <div class="sort-item" data-sort="7th">7th Floor</div>
          <div class="sort-item" data-sort="6th">6th Floor</div>
          <div class="sort-item" data-sort="LG">LG Floor</div>
        </div>
      </div>

      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search">
      </div>
    </div>

    <section class="table-section">
      <div class="table-header">
        <span>Area</span>
        <span>Facility</span>
        <span>Status</span>
        <span></span>
      </div>

      <div id="adminList" class="admin-list"></div>
    </section>

    <div class="popup hidden" id="detailPopup">
      <div class="detail-modal">
        <button id="closeDetail" class="back-btn">←</button>

        <div class="detail-img-wrap">
          <img id="detailImg" class="detail-img">
        </div>

        <div class="detail-info">
          <span id="detailStatus"></span>
          <span id="detailDate"></span>
          <span id="detailLocation"></span>
          <span id="detailFacility"></span>
        </div>

        <div class="detail-desc" id="detailDesc"></div>
      </div>
    </div>

  </div>

  <script src="adminscript.js"></script>
</body>
</html>
