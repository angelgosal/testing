<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Reports</title>
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="viewReportStyle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="phone">
    <div class="fixed-header">
    <header class="logo-container">
        <img src="logo.png" alt="Logo" class="main-logo" onclick="location.href='aboutus.html'">
    </header>

    <div class="search-area">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search">
            <i class="fa fa-search"></i>
        </div>
    </div>

    <div class="action-btns">
        <div class="sort-wrapper">
            <button class="btn-action" id="sortBtn">
                Sort <i class="fa fa-chevron-down"></i>
            </button>

            <div class="sort-dropdown" id="sortMenu">
                <div class="sort-item" data-sort="latest">Latest</div>
                <div class="sort-item" data-sort="oldest">Oldest</div>
                <div class="sort-item" data-sort="19th">19th Floor</div>
                <div class="sort-item" data-sort="7th">7th Floor</div>
                <div class="sort-item" data-sort="6th">6th Floor</div>
                <div class="sort-item" data-sort="LG">LG Floor</div>
            </div>
        </div>

        <button class="btn-action" onclick="location.href='addreport.html'">
            <i class="fa fa-plus"></i> Report
        </button>
    </div>
</div>

    <div class="tabs">
        <button class="tab active" id="reportedTab">Reported/In-Progress</button>
        <button class="tab" id="fixedTab">Fixed</button>
    </div>

    <div class="reports-section">
        <main id="reportsContainer" class="reports-container"></main>
    </div>

    <nav class="bottom-nav">
        <a href="homepage.html">Home</a>
        <a class="active" href="viewreport.html">View Reports</a>
        <a href="feedback.html">Feedback</a>
    </nav>

    <!-- Detail Popup -->
    <div class="popup hidden" id="detailPopup">
    <div class="detail-modal">

        <div class="detail-top-box">
        <button id="closeDetail" class="back-btn">←</button>

        <img id="detailImg" src="" class="detail-img">

        <div class="detail-info">
        <span id="detailStatus"></span>
        <span id="detailDate"></span>
        <span id="detailLocation"></span>
        <span id="detailFacility"></span>
        </div>
        </div>

        <div class="detail-desc" id="detailDesc"></div>

    </div>
    </div>
    

</div>
    <script src="viewReportScript.js"></script>
</body>
</html>
