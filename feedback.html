<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusCare – Feedback</title>
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="feedback.css">
  <script src="script.js"></script>
</head>
<body>

<!-- ═══════════════ STEP 1 ═══════════════ -->
<div id="step1">
  <div class="phone">

    <!-- ── Shared Header ── -->
    <div class="app-logo">
      <img src="CampusCare_Logo.png" alt="CampusCare" class="logo-img">
    </div>

    <!-- Mid card with text + buttons -->
    <div class="mid-card" style="padding-bottom: 80px;">
      <p class="desc-text">
        This is the page where user can send feedback to the creator of the website.
      </p>
      <p class="question-text">Do you want to send a feedback?</p>
      <button class="btn-anon" onclick="chooseAnon(true)">
        Send feedback Anonymously
      </button>
      <button class="btn-identity" onclick="chooseAnon(false)">
        Send feedback With Identity
      </button>
    </div>
  </div>

  <!-- Bottom nav – step 1 only -->
  <nav class="bottom-nav">
    <div class="nav-box" onclick="location.href='homepage.html'">Home</div>
    <div class="nav-box" onclick="location.href='viewreport.html'">View Reports</div>
    <div class="nav-box active">Feedback</div>
  </nav>
</div>

<!-- ═══════════════ STEP 2 ═══════════════ -->
<div class="container" id="step2">

  <!-- ── Shared Header ── -->
  <div class="app-logo">
      <img src="CampusCare_Logo.png" alt="CampusCare" class="logo-img">
    </div>

  <div id="emailField" class="field-wrap" style="display:none">
    <input type="email" id="fbEmail" placeholder="Sampoerna Email">
  </div>

  <div id="feedbackWrap" class="field-wrap">
    <textarea id="feedback" placeholder="Enter Feedback"></textarea>
  </div>

  <div class="btn-row">
    <button class="btn-cancel" onclick="goBack()">Cancel</button>
    <button class="btn-submit" onclick="confirmSubmit()">Submit</button>
  </div>

  <!-- ═══════════════ STEP 3 – confirm modal ═══════════════ -->
  <div class="fb-popup hidden" id="step3-overlay">
    <div class="confirm-modal">
      <div class="confirm-message">
        Do you wish to submit your feedback?
      </div>
      <div class="confirm-actions">
        <button class="btn-cancel" onclick="goBackToInput()">Cancel</button>
        <button class="btn-submit" onclick="submitFeedbackFinal()">Confirm</button>
      </div>
    </div>
  </div>

</div>

<!-- ═══════════════ STEP 4 – success ═══════════════ -->
<div id="step4">
  <div class="success-layout">

    <header class="success-header">
      <img src="CampusCare_Logo.png" class="logo-img">
    </header>

    <div class="success-container">
      <h2 class="success-title">Sent!</h2>

      <div class="success-box">
        <p>Thank you for the Feedback!</p>
      </div>

      <button class="success-btn" onclick="resetFeedback()">Okay.</button>
    </div>

  </div>
</div>



<script>
  // ── File System Access API log writer ──────────────────────
  // On first submit, asks the user to pick (or create) feedback_log.txt.
  // The handle is kept in memory so subsequent submits append silently.
  let logFileHandle = null;

  async function appendToLogFile(entry) {
    try {
      // If we don't have a handle yet, prompt the user to pick the file
      if (!logFileHandle) {
        logFileHandle = await window.showSaveFilePicker({
          suggestedName: 'feedback_log.txt',
          types: [{
            description: 'Text file',
            accept: { 'text/plain': ['.txt'] }
          }],
          // Exclude accept type "All files" to keep it clean
        });
      }

      // Read existing content so we can append
      const existingFile = await logFileHandle.getFile();
      const existingText = await existingFile.text();

      // Write existing + new entry
      const writable = await logFileHandle.createWritable();
      await writable.write(existingText + entry);
      await writable.close();

      return true;
    } catch (err) {
      // User cancelled the picker or permission denied
      console.warn('File write cancelled or failed:', err);
      return false;
    }
  }

  // ── Step navigation ────────────────────────────────────────
  function chooseAnon(choice) {
    anonymousChoice = choice;
    document.getElementById('step1').style.display = 'none';
    document.getElementById('step2').style.display = 'block';

    const emailField   = document.getElementById('emailField');
    const feedbackWrap = document.getElementById('feedbackWrap');
    const btnRow       = document.querySelector('#step2 .btn-row');

    if (choice) {
      emailField.style.display = 'none';
      feedbackWrap.classList.remove('with-identity');
      btnRow.style.top = '648px';
    } else {
      emailField.style.display = 'block';
      feedbackWrap.classList.add('with-identity');
      btnRow.style.top = '648px';
    }
  }

  function goBack() {
    document.getElementById('step2').style.display = 'none';
    document.getElementById('step1').style.display = 'block';
  }

  function confirmSubmit() {
    var feedback = document.getElementById('feedback').value;
    var email    = document.getElementById('fbEmail') ? document.getElementById('fbEmail').value : '';
    if (!feedback) { alert('Please enter feedback first'); return; }
    if (!anonymousChoice && !email) { alert('Email is required if not anonymous'); return; }
    if (!anonymousChoice && email && !isValidSampoernaEmail(email)) {
      alert('Please use a valid Sampoerna University email.');
      return;
    }
    var overlay = document.getElementById('step3-overlay');
    overlay.classList.remove('hidden');
    setTimeout(function() { overlay.classList.add('active'); }, 10);
  }

  function goBackToInput() {
    var overlay = document.getElementById('step3-overlay');
    overlay.classList.remove('active');
    setTimeout(function() { overlay.classList.add('hidden'); }, 600);
  }

  async function submitFeedbackFinal() {
    var isAnon   = anonymousChoice;
    var email    = isAnon ? null : document.getElementById('fbEmail').value.trim();
    var feedback = document.getElementById('feedback').value.trim();

    // Build the log entry (same format as server.js used)
    var timestamp = new Date().toLocaleString();
    var entry = '─────────────────────────────────────\n';
    entry += 'Timestamp : ' + timestamp + '\n';
    entry += 'Type      : ' + (isAnon ? 'Anonymous' : 'With Identity') + '\n';
    if (!isAnon) entry += 'Email     : ' + (email || '(not provided)') + '\n';
    entry += 'Feedback  :\n' + feedback + '\n';
    entry += '─────────────────────────────────────\n\n';

    // Write to file — if user cancels the picker we still show success
    // (feedback is not lost; you can add localStorage fallback if needed)
    await appendToLogFile(entry);

    // Dismiss confirm overlay
    var overlay = document.getElementById('step3-overlay');
    overlay.classList.remove('active');
    setTimeout(function() { overlay.classList.add('hidden'); }, 600);
    document.getElementById('step2').style.display = 'none';

    // Show success screen
    var step4 = document.getElementById('step4');
    step4.style.display = 'flex';
    setTimeout(function() { step4.classList.add('active'); }, 10);
  }

  function resetFeedback() {
    var step4 = document.getElementById('step4');
    step4.classList.remove('active');
    setTimeout(function() { step4.style.display = 'none'; }, 600);
    document.getElementById('step1').style.display = 'block';
    document.getElementById('feedback').value = '';
    document.getElementById('fbEmail').value = '';
  }
</script>

</body>
</html>
